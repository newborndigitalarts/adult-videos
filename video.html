<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVC – Watch</title>
<meta name="description" content="Watch on Naughty Video Club">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<script src="data.js"></script>
<style>
:root {
  --bg:#111;
  --bg2:#1a1a1a;
  --bg3:#222;
  --border:#2e2e2e;
  --red:#e02020;
  --red2:#ff3333;
  --text:#f0f0f0;
  --muted:#888;
  --muted2:#555;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;}

.header{background:#000;border-bottom:2px solid var(--red);padding:0 16px;height:48px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:300;}
.logo{display:flex;align-items:baseline;gap:5px;text-decoration:none;flex-shrink:0;}
.logo-n{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--red);letter-spacing:2px;}
.logo-v{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#fff;letter-spacing:2px;}
.logo-c{font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:var(--muted);}
.header-back{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:6px 14px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;letter-spacing:.5px;transition:all .2s;}
.header-back:hover{color:#fff;border-color:var(--red);}

.page-wrap{display:flex;max-width:1400px;margin:0 auto;padding:16px;gap:16px;align-items:flex-start;}

.side-left,.side-right{width:180px;flex-shrink:0;min-height:420px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted2);font-size:10px;letter-spacing:1px;text-transform:uppercase;}

.main-col{flex:1;min-width:0;}

.player-wrap{position:relative;width:100%;padding-bottom:56.25%;background:#000;border:1px solid var(--border);}
.player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#000;}
.player-shield{position:absolute;top:0;left:0;width:100%;height:87%;z-index:10;cursor:default;}

.video-info{padding:12px 0 8px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.video-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:6px;}
.video-meta{font-size:11px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;}
.tag-list{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;}
.tag-pill{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:10px;font-weight:600;padding:3px 9px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.tag-pill:hover{border-color:var(--red);color:#fff;}

.rec-head{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.rec-head::before{content:'';display:block;width:3px;height:16px;background:var(--red);}
.rec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

.vcard{cursor:pointer;transition:transform .15s;}
.vcard:hover{transform:translateY(-2px);}
.vthumb{position:relative;width:100%;padding-bottom:56.25%;background:var(--bg3);overflow:hidden;}
.vthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.vcard:hover .vthumb img{transform:scale(1.05);}
.voverlay{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.vcard:hover .voverlay{opacity:1;}
.vplay{width:36px;height:36px;background:rgba(224,32,32,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.vplay::after{content:'';width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:11px solid #fff;margin-left:3px;}
.vdur{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.85);color:#fff;font-size:10px;font-weight:600;padding:1px 5px;}
.vhd{position:absolute;top:4px;left:4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 4px;letter-spacing:.5px;}
.vnew{position:absolute;top:4px;right:4px;background:#f5a623;color:#000;font-size:9px;font-weight:700;padding:1px 4px;}
.vinfo{padding:5px 2px 2px;}
.vtitle{font-size:11px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.vmeta{font-size:10px;color:var(--muted);}

.not-found{padding:60px 20px;text-align:center;color:var(--muted);}
.not-found h2{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--red);margin-bottom:12px;letter-spacing:2px;}

.site-footer{background:#000;border-top:1px solid var(--border);padding:16px;text-align:center;color:var(--muted2);font-size:11px;margin-top:24px;}
.site-footer a{color:var(--muted);text-decoration:none;margin:0 8px;}
.site-footer a:hover{color:var(--red);}

@media(max-width:1100px){.side-left,.side-right{display:none;}}
@media(max-width:700px){.rec-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div class="header">
  <a class="logo" href="index.html">
    <span class="logo-n">Naughty</span>
    <span class="logo-v">Video</span>
    <span class="logo-c">Club</span>
  </a>
  <a class="header-back" href="index.html">← Back</a>
</div>

<div class="page-wrap">
  <div class="side-left"></div>
  <div class="main-col" id="mainCol"><div class="not-found"><h2>Loading...</h2></div></div>
  <div class="side-right"></div>
</div>

<div class="site-footer">
  <p>© 2025 NaughtyVideoClub.com &nbsp;|&nbsp;
    <a href="dmca.html">DMCA</a>
    <a href="dmca.html">Privacy Policy</a>
    <a href="dmca.html">Terms of Use</a>
  </p>
  <p style="margin-top:6px;">All videos are embedded from third-party platforms. We do not host any video files.</p>
</div>

<script>
function getParam(name){return new URLSearchParams(window.location.search).get(name);}

function goVideo(id){window.location.href='video.html?id='+id;}

function getRandom8(pool,excludeId){
  const arr=[...pool.filter(v=>v.id!==excludeId)];
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr.slice(0,8);
}

function makeRecCard(v){
  const thumb=THUMBS[v.xvId]||('https://picsum.photos/seed/'+v.xvId+'/400/225');
  const fb='https://picsum.photos/seed/'+v.xvId+'/400/225';
  return '<div class="vcard" onclick="goVideo('+v.id+')">'
    +'<div class="vthumb">'
    +'<img src="'+thumb+'" alt="" loading="lazy" onerror="this.onerror=null;this.src=\''+fb+'\'">'
    +'<div class="voverlay"><div class="vplay"></div></div>'
    +'<span class="vdur">'+v.duration+'</span>'
    +(v.hd?'<span class="vhd">HD</span>':'')
    +(v.isNew?'<span class="vnew">NEW</span>':'')
    +'</div>'
    +'<div class="vinfo">'
    +'<div class="vtitle">'+v.title+'</div>'
    +'<div class="vmeta">'+(v.views?v.views+' views • ':'')+(v.tags[0]||'')+'</div>'
    +'</div></div>';
}

function render(){
  const id=parseInt(getParam('id'));
  const col=document.getElementById('mainCol');
  if(!id||isNaN(id)){col.innerHTML='<div class="not-found"><h2>Video Not Found</h2></div>';return;}
  const v=videos.find(x=>x.id===id);
  if(!v){col.innerHTML='<div class="not-found"><h2>Video Not Found</h2><p>This video may have been removed.</p></div>';return;}

  document.title=v.title+' – NVC';

  const primaryTag=v.tags[0]||'';
  let pool=primaryTag?videos.filter(x=>x.tags.includes(primaryTag)):videos;
  if(pool.length<5)pool=videos;
  const rec8=getRandom8(pool,v.id);

  const tagsHtml=(v.tags||[]).map(t=>'<span class="tag-pill" onclick="window.location.href=\'index.html?cat='+encodeURIComponent(t)+'\'">'+t+'</span>').join('');

  col.innerHTML=
    '<div class="player-wrap">'
    +'<iframe src="'+v.embedUrl+'" allow="autoplay"></iframe>'
    +'<div class="player-shield"></div>'
    +'</div>'
    +'<div class="video-info">'
    +'<div class="video-title">'+v.title+'</div>'
    +'<div class="video-meta">'
    +(v.views?'<span>👁 '+v.views+' views</span>':'')
    +'<span>⏱ '+v.duration+'</span>'
    +(v.hd?'<span>🎬 HD</span>':'')
    +'</div>'
    +'<div class="tag-list">'+tagsHtml+'</div>'
    +'</div>'
    +(rec8.length?'<div class="rec-head">More Like This</div><div class="rec-grid">'+rec8.map(makeRecCard).join('')+'</div>':'');
}

render();
</script>
</body>
</html>
